<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicio de sesion</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <!--Fontasome-->
    <link href="resorces/fontawesome/css/all.css" rel="stylesheet">
    <link rel="stylesheet" href="css/IndexStyle.css">

</head>

<body class="container mt-5 align-items-center">

    <div id="InicioSesionDiv" class="text-center">
        <main class="form-signin w-100 m-auto">
            <img class="mb-4" src="resorces/Logo.png" alt="" width="250">
            <h1 class="h3 mb-3 fw-normal">Inicia sesión</h1>

            <div class="form-floating">
                <input type="text" class="form-control" id="usuario" placeholder="Ejemplo@mail.com">
                <label for="usuario">Usuario</label>
            </div>
            <div class="form-floating">
                <input type="password" class="form-control" id="contraseña">
                <label for="contraseña">Contraseña</label>
            </div>

            <div class="checkbox mb-3">
                <label>
                    <input type="checkbox" value="remember-me"> Mantener sesion activa
                </label>
            </div>
            <div class="checkbox mb-3">
                ¿No tienes una cuenta? <a href="Registro.html">Registrate</a>
            </div>
            <button onclick="ComprobarSesion()" class="w-100 btn btn-lg btn-primary">Ingresar</button>

        </main>
    </div>
    <div id="Depuracion">

    </div>

</body>
<script src="js/Sesion.js"></script>

</html>
