<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <!--Fontasome-->
    <link href="resorces/fontawesome/css/all.css" rel="stylesheet">

</head>

<body>
    <div class="container container-fluid">

        <div class="row m-2">

            <div class="col-md-12 card mb-4 bg-success text-white">
                <h2 class="text-center ">Registro</h2>
            </div>
            <!--Usar is_valid (bootstrap) para cuando el nombre de usuario este ocupado o no-->

            <div class="col-md-6 text-center">
                <div class="form-floating mb-3">
                    <input id="TXTNombre" class="form-control RegisElement" type="text" placeholder="Nombre">
                    <label class="text-secondary" for="TXTNombre"> <i class="fa fa-user" aria-hidden="true"></i> Nombre:
                    </label>
                </div>
            </div>
            <div class="col-md-3 text-center">
                <div class="form-floating mb-3">
                    <input id="TXTApellidoP" class="form-control RegisElement" type="text" placeholder="Apellido Paterno">
                    <label class="text-secondary" for="TXTApellidoP"> <i class="fa-solid fa-person"></i> Apellido
                        Paterno: </label>
                </div>
            </div>
            <div class="col-md-3 text-center">
                <div class="form-floating mb-3">
                    <input id="TXTApellidoM" class="form-control RegisElement" type="text" placeholder="Apellido Materno">
                    <label class="text-secondary" for="TXTApellidoM"> <i class="fa-solid fa-person-dress"></i> Apellido
                        Materno: </label>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control RegisElement" id="TXTCorreo" placeholder="TuCorreo@ejemplo.com">
                    <label class="text-secondary" for="TXTCorreo"> <i class="fas fa-at    "></i> Correo electrónico:
                    </label>
                </div>

                <!--div class="form-floating mb-3">
                        <input type="email" class="form-control is-valid" id="floatingInputInvalid"
                            placeholder="name@example.com" value="test@example.com">
                        <label for="floatingInputInvalid">Invalid input</label>
                    </div-->
            </div>
            <div class="col-md-6">
                <div class="form-floating mb-3">
                    <input type="tel" class="form-control RegisElement" id="TXTCelular" placeholder="TuCorreo@ejemplo.com">
                    <label class="text-secondary" for="TXTCelular"> <i class="fa-solid fa-mobile"></i> Celular: </label>
                </div>
            </div>

            <!--div class="col-md-6">
                    <label for="TXTImagen" class="form-label"> <i class="fa-solid fa-mobile"></i> Cargar imagen: </label>
                    <input type="file" class="form-control" id="TXTImagen">
            </div-->
            <hr>
            <div class="col-md-12 text-center">
                <div class="form-floating mb-3">
                    <input id="TXTUsername" onkeyup="ValidarUsuario()" class="form-control" type="text" placeholder="Username">
                    <label class="text-secondary" for="TXTUsername"> <i class="fa-solid fa-face-laugh-wink"></i> Nombre
                        de usuario:
                    </label>
                </div>
            </div>
            <div class="col-md-6 text-center">
                <label class="text-secondary mb-2" for="TXTContraseña"> <i class="fa-solid fa-key"></i> Contraseña:
                </label>
                <div class="input-group mb-3">
                    <input type="password" id="TXTContraseña" class="form-control RegisElement" placeholder="Contraseña">
                    <button onclick="PasswordHS('TXTContraseña',0)" class="btn btn-outline-secondary" type="button"
                        id="BTNContraseña"><i class="fa fa-eye" aria-hidden="true"></i> </button>
                </div>

            </div>
            <div class="col-md-6 text-center">
                <label class="text-secondary mb-2" for="TXTContraseñaConf"> <i class="fa-solid fa-key"></i> Confirmar
                    Contraseña:
                </label>
                <div class="input-group mb-3">
                    <input type="password" id="TXTContraseñaConf" class="form-control RegisElement"
                        placeholder="Confirma tu contraseña">
                    <button onclick="PasswordHS('TXTContraseñaConf',1)" class="btn btn-outline-secondary" type="button"
                        id="BTNContraseñaConf"><i class="fa fa-eye" aria-hidden="true"></i> </button>
                </div>
            </div>


            <div class="d-grid gap-2 col-6 mx-auto">
                <button id="BTNRegistro" class="btn btn-lg btn-outline-success "> <i class="fa fa-registered" aria-hidden="true"></i>
                    Registrarme </button>
            </div>

        </div>


        <!--div class="position-relative m-4">
            <div class="progress" style="height: 2px;">
                <div class="progress-bar bg-success" role="progressbar" aria-label="Progress" style="width: 30%;"
                    aria-valuenow="40" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <button type="button"
                class="position-absolute top-0 start-0 translate-middle btn btn-sm btn-success rounded-pill"
                style="width: 2rem; height:2rem;">1</button>
            <button type="button"
                class="position-absolute top-0 start-50 translate-middle btn btn-sm btn-secondary rounded-pill"
                style="width: 2rem; height:2rem;">2</button>
            <button type="button"
                class="position-absolute top-0 start-100 translate-middle btn btn-sm btn-secondary rounded-pill"
                style="width: 2rem; height:2rem;">3</button>
        </div-->
    </div>
</body>
<script src="js/Registro.js"></script>

</html>
